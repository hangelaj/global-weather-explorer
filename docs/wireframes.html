<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Wireframes - Global Weather Explorer</title>

<style>

body{
font-family: Arial;
padding:20px;
}

.box{
border:2px dashed #333;
padding:20px;
margin:15px 0;
}

.row{
display:flex;
gap:10px;
}

.small{
flex:1;
}

</style>

</head>

<body>

<h1>Wireframes - Global Weather Explorer</h1>

<div class="box">
<h2>Header</h2>
<p>Title + Description + Weekly Calendar</p>
</div>

<div class="box">
<h2>Search Section</h2>
<p>Input Field + Search Button</p>
</div>

<div class="box">
<h2>Current Weather</h2>
<p>City Image</p>
<p>City Name</p>
<p>Temperature</p>
<p>Weather Info</p>
</div>

<div class="box">
<h2>Forecast Section</h2>

<div class="row">
<div class="box small">Day 1</div>
<div class="box small">Day 2</div>
<div class="box small">Day 3</div>
<div class="box small">Day 4</div>
<div class="box small">Day 5</div>
</div>

</div>

<div class="box">
<h2>Footer</h2>
<p>Copyright + API Credit</p>
</div>

</body>
</html>
